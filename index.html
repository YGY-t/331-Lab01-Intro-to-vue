<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intro SE331</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
    <div class="nav-bar"></div>
    <div class="cart">Cart({{ cart }})</div>
    <div class="product-display">
        <div class="product-container">
            <div class="product-image">
                <img :src="image">
            </div>
        </div>
        <div class="product-info">
            <h1><a :href="link">{{product}}</a></h1>
            <p>{{description}}</p>
            <p v-if="inventory > 10">In Stock</p>
            <p v-else-if="inventory <= 10 && inventory > 0">Almost out of Stock</p>
            <p v-else>Out of Stock</p>

            <p v-if="onSale">On Sale!</p>
            <ul>
                <li v-for="detail in details">{{detail}}</li>
            </ul>
            <div v-for="variant in variants" :key="variant.id" @mouseover="updateImage(variant.image)">
                {{ variant.color }}
            </div>
            <div>
                <h3>Sizes:</h3>
                <span v-for="size in sizes" :key="size">{{ size }}, </span>
            </div>
            <button class="button" v-on:click="addToCart">Add To Cart</button>
            <button class="button" @click="toggleInStock">Toggle Stock</button>
        </div>
    </div>
</div>
        
    <!-- Import Js -->
    <script src="./main.js"></script>
</body>

</html>
